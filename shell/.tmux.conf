# Change prefix from Ctrl+B to Ctrl+A
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix
set -sg escape-time 0

# Enable mouse support
set -g mouse on

# Better split keybindings
bind | split-window -h
bind - split-window -v
unbind '"'
unbind %

# Easy config reload
bind r source-file ~/.tmux.conf \; display-message "Config reloaded!"

# Switch panes using prefix + hjkl (vim-style)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Switch panes using prefix + arrow keys
bind Left select-pane -L
bind Down select-pane -D
bind Up select-pane -U
bind Right select-pane -R

# Enable vi mode
setw -g mode-keys vi

# Start windows and panes at 1, not 0
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows when a window is closed
set -g renumber-windows on

# Increase scrollback buffer size
set -g history-limit 10000

# Status bar configuration
# Change status bar color when prefix is active (red when active, black when normal)
set -g status-style '#{?client_prefix,bg=white fg=black,bg=black fg=white}'
set -g status-left '#{?client_prefix,#[fg=black],#[fg=white]}#S '
set -g status-right '#{?client_prefix,#[fg=black],#[fg=white]}%Y-%m-%d %H:%M'
set -g status-left-length 20
set -g status-right-length 40

# Fix status bar height and remove debugging info
set -g status on

# Window status
setw -g window-status-current-style '#{?client_prefix,fg=white bg=black bold,fg=black bg=white bold}'
setw -g window-status-style '#{?client_prefix,fg=black bg=white,fg=white bg=black}'

# Pane borders
set -g pane-border-style 'fg=colour238'
set -g pane-active-border-style 'fg=colour51'

# Fix colors in tmux
set -g default-terminal "screen-256color"
set -ga terminal-overrides ",xterm-256color*:Tc"
set -g allow-passthrough on
set -g allow-passthrough on
